{% extends "base.html" %}

{% block title %}Eliminar Cuenta Bancaria - Telecom Technology{% endblock %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">
        <i class="fas fa-trash me-2"></i>Eliminar Cuenta Bancaria
    </h1>
    <div class="btn-toolbar mb-2 mb-md-0">
        <a href="{% url 'bancos_list' %}" class="btn btn-outline-secondary">
            <i class="fas fa-arrow-left me-1"></i>Volver
        </a>
    </div>
</div>

<div class="card shadow-sm">
    <div class="card-body">
        <p>¿Seguro que deseas eliminar la cuenta <strong>{{ cuenta.nombre }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-danger">
                    <i class="fas fa-trash me-1"></i>Eliminar
                </button>
                <a href="{% url 'bancos_list' %}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
